services:
  - type: web
    name: placenix
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm run dev:backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: VITE_GEMINI_API_KEYS
        sync: false
